# Bluetooth — deaktiviert bis zur BT-Implementierung (Zephyr 4.4.0-rc1 Bug:
# coexist_printf fehlt in HAL CMakeLists wenn BT+WiFi gleichzeitig aktiv)
# CONFIG_BT=y
# CONFIG_BT_CENTRAL=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_TCP=y
CONFIG_NET_IPV4=y

# WiFi (ESP32) — WIFI_ESP32 wird automatisch durch Board-DTS aktiviert
CONFIG_WIFI=y

# HTTP Server
CONFIG_HTTP_SERVER=y

# MQTT
CONFIG_MQTT_LIB=y

# USB (neuer Device Stack, Zephyr 4.x)
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_UART_LINE_CTRL=y

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_BACKEND_SERIAL_CHECK_DTR=y
CONFIG_SHELL_START_OBSCURED=y

# Logging
CONFIG_LOG=y
