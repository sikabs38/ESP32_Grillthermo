# Bluetooth (BLE-REQ-01..10) — coexist_printf-Workaround in app/src/coex_printf.c
# (hal_espressif esp32s3-CMakeLists haengt die Quelle nicht ein; lokal nachgereicht)
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_AUTO_DISCOVER_CCC=n
CONFIG_BT_DEVICE_NAME="GrillBuddy"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=0
# BLE-NFR-03: kein SMP/Bonding, keine Settings-Persistenz
CONFIG_BT_SMP=n
CONFIG_BT_SETTINGS=n
# BLE-REQ-03: Eigenes bt-Kommando in shell.c — Zephyrs eingebauter bt-Shell-Befehl off
CONFIG_BT_SHELL=n
# Notify-Payload des G32: 28 B Nutzdaten — Buffer mit Reserve
CONFIG_BT_L2CAP_TX_MTU=64
CONFIG_BT_BUF_ACL_RX_SIZE=68

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_TCP=y
CONFIG_NET_IPV4=y

# WiFi (ESP32) — WIFI_ESP32 wird automatisch durch Board-DTS aktiviert
CONFIG_WIFI=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_L2_WIFI_MGMT=y
# Auto-DHCPv4 des ESP32-WiFi-Treibers (in Zephyr 4.4 mit ESP32_-Praefix)
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y

# Netzwerkpuffer: TX muss Headers (ungeACKt) + HTML-Body (~2KB inkl. SSE-Script)
# gleichzeitig halten. net_buf je 128B: ~16 buf fuer Body + Header-Reserve; 48 mit Margin.
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=48
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=16
CONFIG_NET_MGMT_EVENT_QUEUE_TIMEOUT=5000

# HTTP Server
CONFIG_HTTP_SERVER=y
CONFIG_HTTP_SERVER_CLIENT_BUFFER_SIZE=1500
CONFIG_HTTP_SERVER_STACK_SIZE=4096
# WEB-REQ-08: maximal 3 gleichzeitige HTTP-Clients
CONFIG_HTTP_SERVER_MAX_CLIENTS=3
# HTTP_SERVER_SOCK_COUNT = 1 (eventfd) + NUM_SERVICES (1) + MAX_CLIENTS (3) = 5
CONFIG_ZVFS_POLL_MAX=8

# MQTT
CONFIG_MQTT_LIB=y

# USB (neuer Device Stack, Zephyr 4.x)
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_UART_LINE_CTRL=y

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_BACKEND_SERIAL_CHECK_DTR=y

# Hostname (WIF-REQ-06)
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME_DYNAMIC=y

# Logging
CONFIG_LOG=y
CONFIG_SHELL_LOG_BACKEND=y
CONFIG_LOG_CMDS=y
CONFIG_LOG_DEFAULT_LEVEL=1

# Konfigurationsspeicher (CFG-REQ-01, CFG-REQ-02, CFG-REQ-06)
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_CRC=y
