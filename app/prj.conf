# Bluetooth
CONFIG_BT=y
CONFIG_BT_CENTRAL=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_TCP=y
CONFIG_NET_IPV4=y

# WiFi (ESP32)
CONFIG_WIFI=y
CONFIG_ESP32_WIFI=y

# HTTP Server
CONFIG_HTTP_SERVER=y

# MQTT
CONFIG_MQTT_LIB=y

# USB
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_BACKEND_SERIAL_CHECK_DTR=y
CONFIG_SHELL_START_OBSCURED=y

# Logging
CONFIG_LOG=y
